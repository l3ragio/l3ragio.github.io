# Per-post front-matter overrides for Medium-synced posts.
#
# The ZMediumToMarkdown action overwrites front matter on every sync
# (monthly cron). This file is the source of truth for fields that
# Medium does not provide - categories, custom tags, pin status, etc.
#
# scripts/apply_post_overrides.rb reads this file after the sync and
# re-applies the listed fields to the matching post in
# _posts/zmediumtomarkdown/.
#
# Key = the Medium post slug (the ID after the date in the filename).
# Allowed override fields: categories, tags, pin, image_alt.
# Categories must come from the closed taxonomy in docs/CONVENTIONS.md.

