---
layout: default
---

<article class="vs-article">
  <header class="vs-header">
    <h1 class="vs-title">{{ page.title }}</h1>
  </header>

  {% if page.panels %}
  <section class="vs-panels">
    {% for p in page.panels %}
    <figure class="vs-panel">
      <a href="{{ p.img | relative_url }}" class="vs-image">
        <img
          src="{{ p.img | relative_url }}"
          alt="{{ p.alt | default: 'panel' }}"
          loading="lazy"
          decoding="async"
        >
      </a>
    </figure>
    {% endfor %}
  </section>
  {% endif %}
</article>

<style>
.vs-article { max-width: 1100px; margin: 0 auto; padding: 0 1rem; }
.vs-header { margin: 0 0 var(--space-3, 1.5rem) 0; }
.vs-title { margin: 0; }

.vs-panels {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-3, 1.25rem);
}

.vs-panel {
  margin: 0;
  border: 1px solid var(--border-color, rgba(255,255,255,0.08));
  border-radius: 12px;
  overflow: hidden;
  background: var(--card-bg, transparent);
}

.vs-image { display: block; }
.vs-image img {
  display: block;
  width: 100%;
  height: auto;
}
</style>
