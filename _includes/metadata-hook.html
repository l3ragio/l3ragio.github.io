{% if page.layout == "visual_story" %}
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{ page.title | escape }}" />
  <meta property="og:description" content="{{ page.summary | default: page.subtitle | default: site.description | strip_html | strip_newlines | truncate: 160 | escape }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />

  {% if page.image %}
    {% assign ogimg = page.image | absolute_url %}

    <!-- Open Graph image (WhatsApp / Facebook) -->
    <meta property="og:image" content="{{ ogimg }}" />
    <meta property="og:image:secure_url" content="{{ ogimg }}" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter (also used by Telegram sometimes) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page.title | escape }}" />
    <meta name="twitter:description" content="{{ page.summary | default: page.subtitle | default: site.description | strip_html | strip_newlines | truncate: 200 | escape }}" />
    <meta name="twitter:image" content="{{ ogimg }}" />
  {% endif %}
{% endif %}

<!-- Person schema for the primary author. Adds the avatar image to
     the Person object so social platforms (LinkedIn, X, Slack, etc.)
     have a non-obsolete profile picture next to the author name in
     rich previews. Coexists with Chirpy's BlogPosting JSON-LD
     emitted by jekyll-seo-tag. -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ site.social.name | default: 'Davide Bragetti' }}",
  "url": "{{ site.url }}",
  "image": "{{ site.url }}/assets/img/avatar.png",
  "sameAs": [
    {%- for link in site.social.links -%}
      "{{ link }}"{% unless forloop.last %},{% endunless %}
    {%- endfor -%}
  ]
}
</script>

<!-- Type stack: Spectral (long-form prose), Inter (UI chrome), JetBrains Mono
     (tags, dates, code). Loaded async via preload-then-swap. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Spectral:wght@400;500;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Spectral:wght@400;500;600&display=swap"></noscript>

<script defer src="{{ '/assets/js/data/orbs-bg.js' | relative_url }}"></script>

<script defer src="{{ '/assets/js/data/notification-update.js' | relative_url }}"></script>
